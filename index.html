  LAC: "avg",     // SF + MIA + @ KC
  LAR: "good",    // DAL + @ SEA + @ TB
  LV:  "elite",   // DEN + TEN + @ ARI - very soft

  MIN: "elite",   // DET + WAS + @ NYJ - great matchups
  NE:  "avg",     // @ KC + NYJ + DEN
  NO:  "elite",   // @ TB + ARI + @ ATL - NFC South = soft
  NYG: "tough",   // CLE + @ DET + @ DAL
  NYJ: "avg",     // @ ARI + @ NE + MIN
  PHI: "brutal",  // SEA + HOU + @ SF - hardest W15-17 per ESPN
  PIT: "tough",   // BAL + CAR + @ TEN
  SEA: "brutal",  // @ PHI + LAR + @ CAR - per ESPN hardest
  SF:  "brutal",  // @ LAC + @ KC + PHI
  TB:  "avg",     // @ NO + @ ATL + LAR
  TEN: "good",    // IND + @ LV + @ PIT

// ══════════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════════
const POS_C = {
  QB:{bg:"#e05c5c18",bd:"#e05c5c66",tx:"#e05c5c"},
  RB:{bg:"#3ecf8e18",bd:"#3ecf8e66",tx:"#3ecf8e"},
  WR:{bg:"#5b9cf618",bd:"#5b9cf666",tx:"#5b9cf6"},
  TE:{bg:"#f4a84818",bd:"#f4a84866",tx:"#f4a848"},
};
const GRADE_C = { elite:"#3ecf8e", good:"#7dd98e", avg:"#8b96a8", tough:"#e08c5c", brutal:"#e05c5c" };
const GRADE_PTS = { elite:3, good:1.5, avg:0, tough:-1.5, brutal:-3 };

// ══════════════════════════════════════════════════════
// WEEK 17 FINALS GAMES — environment model
// Offense proxy: sum of team's top-6 projected points
// ══════════════════════════════════════════════════════
const TEAM_OFFENSE = (() => {
  const m = {};
  Object.keys(SCHED).forEach(tm => {
    const top = PLAYERS.filter(p=>p.tm===tm && p.proj).sort((a,b)=>b.proj-a.proj).slice(0,6);
    m[tm] = top.reduce((s,p)=>s+p.proj,0);
  });
  return m;
})();
const W17_GAMES = (() => {
  const games = [];
  Object.entries(SCHED).forEach(([tm, s]) => {
    const [opp, ha] = s.w[2] || [];
    if (ha === "H") games.push({ home: tm, away: opp, env: (TEAM_OFFENSE[tm]||0)+(TEAM_OFFENSE[opp]||0) });
  });
  games.sort((a,b)=>b.env-a.env);
  games.forEach((g,i)=>{ g.grade = i<4?"A":i<8?"B":i<12?"C":"D"; g.rank = i+1; });
  return games;
})();
const W17_LOOKUP = (() => {
  const m = {};
  W17_GAMES.forEach(g => { m[g.home]=g; m[g.away]=g; });
  return m;
})();
const W17_GRADE_C = { A:"#3ecf8e", B:"#7dd98e", C:"#8b96a8", D:"#e08c5c" };

// Winks 5yr construction thresholds
const CONSTRUCTION = {
  r6:  { WR:{min:3,max:4}, RB:{min:2,max:3}, QB:{min:0,max:1}, TE:{min:0,max:1} },
  r10: { WR:{min:4,max:5}, RB:{min:4,max:5}, QB:{min:1,max:2}, TE:{min:0,max:1} },
  r14: { WR:{min:5,max:7}, RB:{min:4,max:5}, QB:{min:1,max:3}, TE:{min:1,max:2} },
  r18: { WR:{min:6,max:7}, RB:{min:5,max:6}, QB:{min:2,max:3}, TE:{min:2,max:3} },
};
// BBM6 winner build: 3 QB / 6 RB / 7 WR / 2 TE (Hero RB, QBs R9-15 all stacked)
const TARGET_BUILD = { QB:[2,3], RB:[5,6], WR:[6,7], TE:[2,3] };

function getCheckpoint(round) {
  if (round <= 6) return { label:"R6", t: CONSTRUCTION.r6 };
  if (round <= 10) return { label:"R10", t: CONSTRUCTION.r10 };
  if (round <= 14) return { label:"R14", t: CONSTRUCTION.r14 };
  return { label:"R18", t: CONSTRUCTION.r18 };
}

const myOverall = (round, slot, ts) => (round-1)*ts + (round%2===1 ? slot : ts+1-slot);

// Pick-back odds: sigmoid on (player ADP - my next overall pick)
function pickBackOdds(adp, nextOverall) {
  const diff = adp - nextOverall;
  return Math.round(100 / (1 + Math.exp(-diff / 4.5)));
}

// ══════════════════════════════════════════════════════
// PICK SCORE ENGINE
// ══════════════════════════════════════════════════════
function computeScore(p, ctx) {
  // ctx: { overall, nextOverall, round, counts, ownedByTeam, bringbackMap, portExp, totalPort }
  let score = 50;
  const why = [];
  const icons = []; // correlation icons: positions I own on this player's team

  // 1) ADP VALUE — biggest driver (platform-specific ADP)
  const platAdp = (ctx.adpKey==="dkAdp" && p.dkAdp) ? p.dkAdp : p.udAdp;
  const vd = ctx.overall - platAdp; // + = falling past ADP
  const vPts = Math.max(-16, Math.min(16, vd * 1.1));
  score += vPts;
  if (vd >= 5) why.push({t:`Falling ${Math.round(vd)} past ADP`, pts:+vPts});
  else if (vd <= -8) why.push({t:`Reach: ${Math.round(-vd)} ahead of ADP`, pts:vPts});

  // 2) CORRELATION (the killer feature)
  const mates = ctx.ownedByTeam[p.tm] || [];
  let cPts = 0;
  if (mates.length) {
    mates.forEach(m => icons.push({kind:"mate", pos:m.pos}));
    const hasQB = mates.some(m=>m.pos==="QB");
    const hasPC = mates.some(m=>m.pos==="WR"||m.pos==="TE");
    const hasRB = mates.some(m=>m.pos==="RB");
    if ((p.pos==="WR"||p.pos==="TE") && hasQB) { cPts += 8; why.push({t:`Stacks with your ${p.tm} QB`, pts:+8}); }
    else if ((p.pos==="WR"||p.pos==="TE") && hasPC) { cPts += 3; why.push({t:`Pairs with your ${p.tm} pass catcher`, pts:+3}); }
    if (p.pos==="QB" && hasPC) { cPts += 7; why.push({t:`Completes stack w/ your ${p.tm} receiver(s)`, pts:+7}); }
    if (p.pos==="QB" && hasRB) { cPts += 3; why.push({t:`Same-team RB correlation`, pts:+3}); }
    if (p.pos==="RB" && hasQB) { cPts += 3; why.push({t:`RB + your ${p.tm} QB (rush TDs)`, pts:+3}); }
  }
  // Bring-back: this player's team faces any team I roster in W15-17
  // QB-anchored bring-backs (game stack) score higher than skill-player-only anchors
  const bbGames = ctx.bringbackMap[p.tm] || [];
  if (bbGames.length && (p.pos==="WR"||p.pos==="RB"||p.pos==="TE"||p.pos==="QB")) {
    const best = bbGames.some(g=>g.qbAnchor) ? 4 : 2;
    cPts += best;
    bbGames.forEach(g => {
      icons.push({kind:"bb", tm:g.myTm, wk:g.wk});
      why.push({t: g.qbAnchor
        ? `Bring-back: faces your ${g.myTm} QB stack W${g.wk}`
        : `Bring-back: faces your ${g.myTm} player(s) W${g.wk}`, pts: +best/bbGames.length});
      // W17 = finals week. Extra weight scaled by game environment grade.
      if (g.wk === 17) {
        const game = W17_LOOKUP[p.tm];
        const bonus = game?.grade==="A" ? 3 : game?.grade==="B" ? 2 : 1;
        cPts += bonus;
        why.push({t:"W17 FINALS game-stack" + (game ? ` (Grade ${game.grade} env, #${game.rank}/16)` : ""), pts:+bonus});
      }
    });
  }
  score += cPts;

  // 3) ROSTER NEED (Winks construction)
  const cp = getCheckpoint(ctx.round);
  const th = cp.t[p.pos];
  const cnt = ctx.counts[p.pos];
  if (cnt < th.min) { score += 6; why.push({t:`Need ${p.pos} (${cnt}/${th.min} by ${cp.label})`, pts:+6}); }
  else if (cnt >= th.max) { score -= 9; why.push({t:`${p.pos} full (${cnt}, max ${th.max} by ${cp.label})`, pts:-9}); }

  // 4) PLAYOFF SCHEDULE W15-17
  const g = SCHED_GRADE[p.tm];
  if (g && GRADE_PTS[g]) {
    score += GRADE_PTS[g];
    if (g==="elite") why.push({t:`Elite W15-17 schedule`, pts:+3});
    if (g==="brutal") why.push({t:`Brutal W15-17 schedule`, pts:-3});
  }

  // 5) PORTFOLIO EXPOSURE
  const pct = ctx.totalPort > 0 ? Math.round(((ctx.portExp[p.n]||0)/ctx.totalPort)*100) : 0;
  if (pct >= 50) { score -= 5; why.push({t:`${pct}% portfolio exposure`, pts:-5}); }
  else if (pct >= 33) { score -= 2; why.push({t:`${pct}% exposure`, pts:-2}); }

  // 6) Contextual nudges
  if (p.pos==="QB" && ctx.counts.QB===0 && ctx.round>=6 && ctx.round<=8 && p.udAdp<=92) { score += 4; why.push({t:`QB window R6-8 — elite tier discount`, pts:+4}); }
  if (p.pos==="QB" && ctx.counts.QB===2 && ctx.round>=15 && p.udAdp>=160) { score += 3; why.push({t:`QB3 round 15+ (3QB beat 2QB in 4/6 yrs)`, pts:+3}); }
  if (p.pos==="TE" && ctx.counts.TE===1 && ctx.round<=8) { score -= 6; why.push({t:`Bully TE (2 early TE) below avg all yrs`, pts:-6}); }
  if (p.udAdp >= 180 && p.udAdp <= 214 && ctx.round >= 13) { score += 2; why.push({t:`Late leverage zone (ADP 180-214)`, pts:+2}); }
  if (p.udAdp >= 215) { score -= 4; why.push({t:`ADP 215+ rarely contributes`, pts:-4}); }
  if (p.tm==="FA") { score -= 5; why.push({t:`Free agent — landing spot unknown`, pts:-5}); }

  return { score: Math.round(score), why, icons, pct };
}

// ══════════════════════════════════════════════════════
// TEAM ANALYZER — post-draft report
// ══════════════════════════════════════════════════════
function analyzeRoster(picks, slot, teamSize, adpKey) {
  const ps = picks.map(pk=>pk.player);
  const counts = {QB:0,RB:0,WR:0,TE:0};
  ps.forEach(p=>{ if(counts[p.pos]!==undefined) counts[p.pos]++; });

  // 1. Construction vs Winks final thresholds
  const T = TARGET_BUILD;
  const constr = ["QB","RB","WR","TE"].map(pos=>{
    const [mn,mx]=T[pos]; const n=counts[pos];
    return { pos, n, mn, mx, ok: n>=mn && n<=mx, dir: n<mn?"under":n>mx?"over":"ok" };
  });
  const constrPass = constr.filter(x=>x.ok).length;

  // 2. Stacks
  const byTeam = {};
  ps.forEach(p=>{ if(p.tm==="FA")return; (byTeam[p.tm]=byTeam[p.tm]||[]).push(p); });
  const stacks = Object.entries(byTeam).filter(([,v])=>v.length>=2)
    .map(([tm,v])=>({tm, players:v, hasQB:v.some(p=>p.pos==="QB"), size:v.length}))
    .sort((a,b)=>b.size-a.size);
  const qbStacks = stacks.filter(s=>s.hasQB);
  const nakedQBs = ps.filter(p=>p.pos==="QB" && (byTeam[p.tm]||[]).length===1);

  // 3. W17 finals coverage — games where I hold both sides
  const gameStacked = W17_GAMES.filter(g => ps.some(p=>p.tm===g.home) && ps.some(p=>p.tm===g.away));
  const w17Exposure = W17_GAMES.map(g => ({g, n: ps.filter(p=>p.tm===g.home||p.tm===g.away).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n);

  // 4. Bye clustering
  const byes = {};
  ps.forEach(p=>{ const b=SCHED[p.tm]?.bye; if(b) byes[b]=(byes[b]||0)+1; });
  const worstBye = Object.entries(byes).sort((a,b)=>b[1]-a[1])[0];

  // 5. Schedule mix (W15-17)
  const schedMix = {elite:0,good:0,avg:0,tough:0,brutal:0};
  ps.forEach(p=>{ const g=SCHED_GRADE[p.tm]; if(g) schedMix[g]++; });

  // 6. Chalk / uniqueness
  let value=0, chalk=0, reach=0;
  picks.forEach((pk,i)=>{
    const ov = myOverall(pk.round, slot, teamSize);
    const adp = pk.player[adpKey]||pk.player.udAdp;
    const d = ov - adp;
    if (d >= 5) value++; else if (d <= -5) reach++; else chalk++;
  });
  const levZone = ps.filter(p=>p.udAdp>=180 && p.udAdp<=214).length;
  const chalkPct = picks.length ? Math.round((chalk/picks.length)*100) : 0;

  // 7. Verdict
  const checks = [
    { ok: constrPass===4, label:"Construction hits all 4 Winks targets", bad:`Construction misses: ${constr.filter(x=>!x.ok).map(x=>`${x.pos} ${x.n} (want ${x.mn}-${x.mx})`).join(", ")}` },
    { ok: qbStacks.length>=1, label:`${qbStacks.length} QB stack${qbStacks.length!==1?"s":""} built`, bad:"No QB stacks — correlation is how tournaments are won" },
    { ok: gameStacked.length>=1, label:`${gameStacked.length} W17 finals game${gameStacked.length!==1?"s":""} stacked both sides`, bad:"No W17 game stacked both sides — your finals ceiling is uncorrelated" },
    { ok: !worstBye || worstBye[1]<=5, label:"Bye weeks distributed", bad:`${worstBye?.[1]} players on W${worstBye?.[0]} bye — regular-season hole` },
    { ok: reach<=2, label:`Reaches controlled (${reach})`, bad:`${reach} reaches of 5+ spots — that bleeds points every year` },
    { ok: chalkPct<=85 || levZone>=2, label:`Differentiation present (${levZone} leverage-zone, ${value} value falls)`, bad:`${chalkPct}% pure-chalk picks, ${levZone} leverage players — likely heavily duplicated in big fields` },
  ];
  const passN = checks.filter(x=>x.ok).length;
  const grade = passN>=6?"A":passN>=5?"B+":passN>=4?"B":passN>=3?"C":"D";

  return { counts, constr, stacks, qbStacks, nakedQBs, gameStacked, w17Exposure, byes, worstBye, schedMix, value, chalk, reach, levZone, chalkPct, checks, grade, total:picks.length };
}

function AnalysisModal({ picks, slot, teamSize, adpKey, onClose }) {
  const a = useMemo(()=>analyzeRoster(picks, slot, teamSize, adpKey), [picks, slot, teamSize, adpKey]);
  const gradeColor = a.grade==="A"?"#3ecf8e":a.grade.startsWith("B")?"#7dd98e":a.grade==="C"?"#f4a848":"#e05c5c";
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:12}} onClick={onClose}>
      <div style={{background:"#0d1420",border:"1px solid #243045",borderRadius:14,padding:20,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontSize:16,fontWeight:700}}>📊 Roster Analysis <span className="mono" style={{fontSize:11,color:"#3a4d63"}}>({a.total}/18 picks)</span></span>
          <span style={{display:"flex",gap:10,alignItems:"center"}}>
            <span className="mono" style={{fontSize:24,fontWeight:700,color:gradeColor}}>{a.grade}</span>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#3a4d63",fontSize:18,cursor:"pointer"}}>✕</button>
          </span>
        </div>

        {/* Verdict checklist */}
        <div style={{marginBottom:14}}>
          {a.checks.map((ch,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:"1px solid #10192a",fontSize:12.5,alignItems:"flex-start"}}>
              <span style={{color:ch.ok?"#3ecf8e":"#e05c5c",fontWeight:700,flexShrink:0}}>{ch.ok?"✓":"✗"}</span>
              <span style={{color:ch.ok?"#94a3b8":"#e08c5c"}}>{ch.ok?ch.label:ch.bad}</span>
            </div>
          ))}
        </div>

        {/* Construction */}
        <div className="panel-t">Construction (target {TARGET_BUILD.QB.join("-")}/{TARGET_BUILD.RB.join("-")}/{TARGET_BUILD.WR.join("-")}/{TARGET_BUILD.TE.join("-")})</div>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          {a.constr.map(x=>(
            <span key={x.pos} className="mono" style={{fontSize:12,padding:"4px 10px",borderRadius:6,border:`1px solid ${x.ok?"#3ecf8e44":"#e05c5c44"}`,color:x.ok?"#3ecf8e":"#e05c5c",background:x.ok?"#3ecf8e0a":"#e05c5c0a"}}>
              {x.pos} {x.n} {x.ok?"✓":`(${x.mn}-${x.mx})`}
            </span>
          ))}
        </div>

        {/* Stacks */}
        <div className="panel-t">Stacks</div>
        <div style={{marginBottom:14}}>
          {a.stacks.length===0 && <div style={{fontSize:12,color:"#e08c5c"}}>No multi-player team stacks.</div>}
          {a.stacks.map(s=>(
            <div key={s.tm} style={{display:"flex",gap:6,alignItems:"center",padding:"4px 0",fontSize:12,flexWrap:"wrap"}}>
              <span style={{fontWeight:700,minWidth:34}} className="mono">{s.tm}</span>
              {s.hasQB && <span className="mono" style={{fontSize:9,color:"#3ecf8e"}}>QB STACK</span>}
              {s.players.map(p=><span key={p.n} style={{display:"inline-flex",gap:3,alignItems:"center"}}>{pb(p.pos,true)}<span>{p.n.split(" ").slice(-1)[0]}</span></span>)}
            </div>
          ))}
          {a.nakedQBs.length>0 && <div style={{fontSize:11.5,color:"#f4a848",marginTop:4}}>⚠ Naked QBs (no teammates): {a.nakedQBs.map(p=>p.n).join(", ")}</div>}
        </div>

        {/* W17 */}
        <div className="panel-t">🏆 Week 17 Finals Coverage</div>
        <div style={{marginBottom:14}}>
          {a.gameStacked.length>0 ? a.gameStacked.map(g=>(
            <div key={g.home} style={{fontSize:12,color:"#3ecf8e",padding:"3px 0"}} className="mono">✓ {g.away} @ {g.home} — both sides held (Grade {g.grade} env)</div>
          )) : <div style={{fontSize:12,color:"#e08c5c"}}>No W17 game held on both sides.</div>}
          {a.w17Exposure.slice(0,4).map(({g,n})=>(
            <div key={g.home} style={{fontSize:11.5,color:"#5a6a80",padding:"2px 0"}} className="mono">{g.away}@{g.home} (Grade {g.grade}): {n} player{n!==1?"s":""}</div>
          ))}
        </div>

        {/* Byes + sched + chalk */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:6}}>
          <div>
            <div className="panel-t">Bye Weeks</div>
            {Object.entries(a.byes).sort((x,y)=>+x[0]-+y[0]).map(([w,n])=>(
              <div key={w} style={{fontSize:11.5,color:n>=5?"#e05c5c":n>=4?"#f4a848":"#5a6a80"}} className="mono">W{w}: {n} player{n!==1?"s":""}</div>
            ))}
          </div>
          <div>
            <div className="panel-t">Differentiation</div>
            <div style={{fontSize:11.5,color:"#5a6a80"}} className="mono">Value falls: <span style={{color:"#3ecf8e"}}>{a.value}</span></div>
            <div style={{fontSize:11.5,color:"#5a6a80"}} className="mono">Chalk (±5 ADP): {a.chalk} ({a.chalkPct}%)</div>
            <div style={{fontSize:11.5,color:"#5a6a80"}} className="mono">Reaches: <span style={{color:a.reach>2?"#e05c5c":"#5a6a80"}}>{a.reach}</span></div>
            <div style={{fontSize:11.5,color:"#5a6a80"}} className="mono">Leverage zone (180-214): <span style={{color:"#f4a848"}}>{a.levZone}</span></div>
            <div style={{fontSize:11.5,color:"#5a6a80",marginTop:4}} className="mono">W15-17 sched: {a.schedMix.elite+a.schedMix.good}🟢 {a.schedMix.avg}⚪ {a.schedMix.tough+a.schedMix.brutal}🔴</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// DRAFT TAB — the whole show
// ══════════════════════════════════════════════════════
function DraftTab({ picks, slot, teamSize, plat, draftName,
                    onSetSlot, onSetTeamSize, onSetPlat, onSetDraftName,
                    onAddPick, onRemovePick, onClearPicks, onSaveDraft,
                    gone, onMarkGone, onUnmarkGone,
                    portExp, totalPort }) {
  const [srch, setSrch] = useState("");
  const [posF, setPosF] = useState("ALL");
  const [expanded, setExpanded] = useState(null);
  const [saved, setSaved] = useState(false);
  const [sortMode, setSortMode] = useState("score"); // score | adp
  const [showGone, setShowGone] = useState(false);
  const [showAnalysis, setShowAnalysis] = useState(false);
  const inputRef = useRef(null);
  useEffect(()=>{ inputRef.current?.focus(); },[]);

  const round = picks.length + 1;
  const overall = myOverall(round, slot, teamSize);
  const nextOverall = myOverall(round+1, slot, teamSize);
  const adpKey = plat==="DK" ? "dkAdp" : "udAdp";

  // Build score context
  const ctx = useMemo(() => {
    const counts = {QB:0,RB:0,WR:0,TE:0};
    const ownedByTeam = {};
    const ownedQBTeams = new Set();
    picks.forEach(pk => {
      const p = pk.player;
      if (counts[p.pos]!==undefined) counts[p.pos]++;
      if (!ownedByTeam[p.tm]) ownedByTeam[p.tm] = [];
      ownedByTeam[p.tm].push(p);
      if (p.pos==="QB") ownedQBTeams.add(p.tm);
    });
    // bring-back map: W15-17 opponents of ANY team I roster → my team + week (+stronger if I own that QB)
    const bringbackMap = {};
    Object.keys(ownedByTeam).forEach(tm => {
      if (tm === "FA") return;
      (SCHED[tm]?.w||[]).forEach(([opp], i) => {
        if (!bringbackMap[opp]) bringbackMap[opp] = [];
        bringbackMap[opp].push({ myTm: tm, wk: 15+i, qbAnchor: ownedQBTeams.has(tm) });
      });
    });
    return { overall, nextOverall, round, counts, ownedByTeam, bringbackMap, portExp, totalPort, adpKey };
  }, [picks, overall, nextOverall, round, portExp, totalPort, adpKey]);

  const ownedSet = useMemo(()=>new Set(picks.map(p=>p.player.n)),[picks]);

  // Score all available players — three buckets:
  // visible | autoGone (ADP says ~97% drafted) | manualGone (user-marked ✕)
  const goneSet = useMemo(()=>new Set(gone),[gone]);
  const AUTO_GONE_MARGIN = 12; // ADP this far before current pick = near-certain drafted
  const isSearching = srch.length >= 2;

  const { scored, autoGone, manualGone } = useMemo(() => {
    const base = PLAYERS
      .filter(p => !ownedSet.has(p.n))
      .filter(p => posF==="ALL"||p.pos===posF)
      .filter(p => !srch || p.n.toLowerCase().includes(srch.toLowerCase()) || p.tm.toLowerCase().startsWith(srch.toLowerCase()))
      .map(p => ({ p, ...computeScore(p, ctx), pback: pickBackOdds(p[adpKey]||p.udAdp, nextOverall),
                   isManualGone: goneSet.has(p.n),
                   isAutoGone: (p[adpKey]||p.udAdp) < overall - AUTO_GONE_MARGIN }));
    const srt = (a,b) => sortMode==="score" ? b.score-a.score : (a.p[adpKey]??999)-(b.p[adpKey]??999);
    // While searching: show EVERYTHING (gone players get a badge + undo)
    if (isSearching) return { scored: base.sort(srt).slice(0,60), autoGone: [], manualGone: [] };
    return {
      scored: base.filter(x=>!x.isManualGone && !x.isAutoGone).sort(srt).slice(0,60),
      autoGone: base.filter(x=>x.isAutoGone && !x.isManualGone).sort(srt),
      manualGone: base.filter(x=>x.isManualGone).sort(srt),
    };
  }, [ownedSet, posF, srch, ctx, sortMode, adpKey, nextOverall, goneSet, overall, isSearching]);

  // Construction alert (one-line ticker, most urgent only)
  const ticker = useMemo(() => {
    const cp = getCheckpoint(round);
    const c = ctx.counts;
    for (const pos of ["WR","RB"]) {
      const th = cp.t[pos];
      const roundsLeft = (cp.label==="R6"?6:cp.label==="R10"?10:cp.label==="R14"?14:18) - (round-1);
      if (c[pos] < th.min && (th.min - c[pos]) >= roundsLeft) return {cls:"tk-alert", msg:`🚨 Need ${th.min-c[pos]} ${pos} in next ${roundsLeft} picks to hit ${cp.label} threshold (${th.min} min)`};
      if (c[pos] < th.min && (th.min - c[pos]) >= roundsLeft - 2) return {cls:"tk-warn", msg:`⚠️ ${pos} behind pace: ${c[pos]}/${th.min} by ${cp.label}`};
    }
    if (round>=6 && round<=8 && c.QB===0) return {cls:"tk-warn", msg:`⚠️ QB window open (R6-8): Burrow 65 · Daniels 67 · Caleb 69 · Maye 69 · Hurts 72`};
    if (round>=14 && c.QB<1) return {cls:"tk-alert", msg:`🚨 Must draft QB1 now — zero-QB past R14 bleeds badly`};
    if (round>=15 && c.QB===2) return {cls:"tk-ok", msg:`✓ QB3 window: 3-QB builds beat 2-QB in 4/6 BBM years (R15-18, ADP 160+)`};
    if (round>=13) return {cls:"tk-ok", msg:`✓ Leverage zone live: ADP 180-214 players contribute like ADP 180-199 but drafted less`};
    return null;
  }, [round, ctx.counts]);

  const handleSave = () => {
    if (!draftName.trim() || !picks.length) return;
    onSaveDraft({name:draftName, players:picks.map(p=>p.player), slot});
    setSaved(true); setTimeout(()=>setSaved(false),2000);
  };

  const buildStr = `${ctx.counts.QB}/${ctx.counts.RB}/${ctx.counts.WR}/${ctx.counts.TE}`;

  return (
    <div>
      {showAnalysis && <AnalysisModal picks={picks} slot={slot} teamSize={teamSize} adpKey={adpKey} onClose={()=>setShowAnalysis(false)}/>}
      {/* Setup row */}
      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <select className="inp" style={{fontSize:12}} value={slot} onChange={e=>onSetSlot(+e.target.value)}>
          {Array.from({length:teamSize},(_,i)=><option key={i+1} value={i+1}>Slot {i+1}</option>)}
        </select>
        <select className="inp" style={{fontSize:12}} value={teamSize} onChange={e=>{const n=+e.target.value;onSetTeamSize(n);if(slot>n)onSetSlot(1);}}>
          {[10,12,14].map(s=><option key={s} value={s}>{s}tm</option>)}
        </select>
        <div style={{display:"flex",gap:2,background:"#0d1420",border:"1px solid #151f2e",borderRadius:7,padding:2}}>
          {["UD","DK"].map(pl=><button key={pl} style={{padding:"4px 11px",borderRadius:5,fontSize:11.5,fontWeight:600,border:"none",background:plat===pl?"#162030":"transparent",color:plat===pl?"#e2e8f0":"#3a4d63",cursor:"pointer"}} onClick={()=>onSetPlat(pl)}>{pl}</button>)}
        </div>
        <input className="inp" style={{flex:1,minWidth:110,fontSize:12}} placeholder="Draft name..." value={draftName} onChange={e=>onSetDraftName(e.target.value)}/>
        {draftName && picks.length>0 && <button onClick={handleSave} style={{padding:"6px 12px",background:saved?"#3ecf8e18":"#3ecf8e",border:"1px solid #3ecf8e",borderRadius:7,color:saved?"#3ecf8e":"#080b10",fontWeight:700,fontSize:11.5,cursor:"pointer"}}>{saved?"✓":"Save"}</button>}
        {picks.length>=8 && <button onClick={()=>setShowAnalysis(true)} style={{padding:"6px 12px",background:"#f4a84812",border:"1px solid #f4a84844",borderRadius:7,color:"#f4a848",fontSize:11.5,fontWeight:700,cursor:"pointer"}}>📊 Analyze</button>}
        {picks.length>0 && <button onClick={onClearPicks} style={{padding:"6px 10px",background:"transparent",border:"1px solid #e05c5c33",borderRadius:7,color:"#e05c5c",fontSize:11.5,cursor:"pointer"}}>Clear</button>}
      </div>

      {/* Status strip */}
      <div className="status-strip">
        <span className="pick-now">R{round} · {round}.{String(round%2===1?slot:teamSize+1-slot).padStart(2,"0")} · #{overall}</span>
        {["QB","RB","WR","TE"].map(pos=>{
          const c = POS_C[pos];
          const cp = getCheckpoint(round);
          const cnt = ctx.counts[pos];
          const under = cnt < cp.t[pos].min;
          const over = cnt > cp.t[pos].max;
          return <span key={pos} className="pos-count" style={{borderColor:under?"#f4a84855":over?"#e05c5c55":c.bd, color:under?"#f4a848":over?"#e05c5c":c.tx, background:c.bg}}>{pos} {cnt}</span>;
        })}
        <span className="build-chip">build {buildStr} · target 2-3/5-6/6-7/2-3</span>
      </div>

      {/* Roster pills (sticky) */}
      {picks.length>0 && (
        <div className="roster-bar">
          <div className="roster-pills">
            {picks.map((pk,i)=>(
              <span key={i} className="rpill">
                <span style={{color:"#2a3850",fontSize:9}}>R{pk.round}</span>
                {pb(pk.player.pos, true)}
                <span style={{fontWeight:600}}>{pk.player.n.split(" ").slice(-1)[0]}</span>
                <span className="rx" onClick={()=>onRemovePick(i)}>×</span>
              </span>
            ))}
          </div>
        </div>
      )}

      {/* Ticker */}
      {ticker && <div className={`ticker ${ticker.cls}`}>{ticker.msg}</div>}

      {/* Search + filters */}
      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
        <input ref={inputRef} className="inp" style={{flex:1,minWidth:140,fontSize:14,padding:"9px 12px"}} placeholder="⚡ Search..." value={srch} onChange={e=>setSrch(e.target.value)}/>
        {["ALL","QB","RB","WR","TE"].map(p=>(
          <button key={p} className={`chip ${posF===p?"chip-on":"chip-off"}`} onClick={()=>setPosF(p)} style={{fontSize:11,padding:"6px 10px"}}>{p}</button>
        ))}
        <button className={`chip ${sortMode==="adp"?"chip-on":"chip-off"}`} onClick={()=>setSortMode(m=>m==="score"?"adp":"score")} style={{fontSize:11,padding:"6px 10px"}}>{sortMode==="score"?"by Score":"by ADP"}</button>
      </div>

      {/* THE BOARD — sorted by pick score */}
      <div className="board">
        {scored.map(({p, score, why, icons, pback, pct, isManualGone, isAutoGone}) => {
          const g = SCHED_GRADE[p.tm];
          const scoreCls = score>=68?"sc-hot":score>=58?"sc-good":score>=45?"sc-mid":"sc-low";
          const isExp = expanded===p.n;
          const adp = p[adpKey]||p.udAdp;
          const pbColor = pback>=70?"#3ecf8e":pback>=40?"#f4a848":"#e05c5c";
          const goneFlag = isManualGone || (isSearching && isAutoGone);
          return (
            <div key={p.n} className="brow" style={goneFlag?{opacity:.45}:undefined}>
              <div className="brow-main" onClick={()=>setExpanded(isExp?null:p.n)}>
                <span className={`score-chip ${scoreCls}`}>{score}</span>
                {pb(p.pos)}
                <div style={{minWidth:0}}>
                  <div className="brow-name">{p.n}</div>
                  <div className="brow-sub">
                    {g && <span className="sched-dot" style={{background:GRADE_C[g]}}/>}
                    <span>{p.tm}</span>
                    {isManualGone && <span style={{color:"#e05c5c",fontWeight:700}}>GONE</span>}
                    {!isManualGone && isSearching && isAutoGone && <span style={{color:"#e08c5c"}}>likely gone</span>}
                    {icons.length>0 && (
                      <span className="corr-icons">
                        {icons.filter((ic,i,a)=>a.findIndex(x=>x.kind===ic.kind&&x.pos===ic.pos&&x.tm===ic.tm&&x.wk===ic.wk)===i).map((ic,i)=> ic.kind==="bb"
                          ? <span key={i} className="corr-icon corr-bb" title={`Bring-back: faces your ${ic.tm} stack in Week ${ic.wk}`}>{ic.tm}·{ic.wk}</span>
                          : pb(ic.pos, true))}
                      </span>
                    )}
                    {pct>=33 && <span style={{color:"#f4a848"}}>{pct}%exp</span>}
                  </div>
                </div>
                <div className="brow-right">
                  <div className="brow-adp">
                    <div>{plat==="DK"&&p.dkEst?"~":""}{adp}</div>
                    <div style={{fontSize:8.5,color:"#2a3850"}}>R{Math.ceil(adp/teamSize)}</div>
                  </div>
                  {isManualGone
                    ? <button className="gone-btn undo" onClick={e=>{e.stopPropagation();onUnmarkGone(p.n);}} title="Undo — he's still available">↩</button>
                    : <button className="gone-btn" onClick={e=>{e.stopPropagation();onMarkGone(p.n);setExpanded(null);}} title="Drafted by another team">✕</button>}
                  <button className="draft-btn" onClick={e=>{e.stopPropagation();onAddPick(p);setExpanded(null);}}>+</button>
                </div>
              </div>
              {isExp && (
                <div className="brow-detail">
                  <div className="detail-meta">
                    <span className="pback" style={{color:pbColor,borderColor:pbColor+"44",background:pbColor+"10"}}>🔙 {pback}% back at #{nextOverall}</span>
                    <span>UD {p.udAdp} · DK {p.dkEst?"~"+p.dkAdp+" est":p.dkAdp||"~"}</span>
                    <span>Proj {p.proj??"—"}</span>
                    {SCHED[p.tm] && <span>W15-17: {SCHED[p.tm].w.map(([o,h])=>h==="A"?"@"+o:o).join(" ")}</span>}
                    {SCHED[p.tm]?.bye && <span style={{color:"#e05c5c"}}>BYE W{SCHED[p.tm].bye}</span>}
                  </div>
                  {why.length>0 ? why.map((w,i)=>(
                    <div key={i} className="why-row">
                      <span>{w.t}</span>
                      <span className="why-pts" style={{color:w.pts>0?"#3ecf8e":"#e05c5c"}}>{w.pts>0?"+":""}{Math.round(w.pts)}</span>
                    </div>
                  )) : <div className="why-row"><span>Baseline value at this pick</span><span className="why-pts">50</span></div>}
                </div>
              )}
            </div>
          );
        })}
        {scored.length===0 && <div className="empty">No players match</div>}
      </div>

      {/* Collapsed: likely drafted + manually marked gone */}
      {!isSearching && (autoGone.length>0 || manualGone.length>0) && (
        <div style={{marginTop:8}}>
          <button onClick={()=>setShowGone(v=>!v)} style={{width:"100%",padding:"8px",background:"#0d1420",border:"1px solid #1c2840",borderRadius:8,color:"#5a6a80",fontSize:12,cursor:"pointer",fontFamily:"DM Mono,monospace"}}>
            🚫 {autoGone.length + manualGone.length} off the board ({manualGone.length} marked · {autoGone.length} likely by ADP) {showGone?"▲":"▼"}
          </button>
          {showGone && (
            <div className="board" style={{marginTop:4}}>
              {[...manualGone, ...autoGone].map(({p, score, isManualGone}) => (
                <div key={p.n} className="brow" style={{opacity:.5}}>
                  <div className="brow-main" style={{minHeight:38,padding:"5px 10px"}}>
                    <span className="score-chip sc-mid" style={{minWidth:30,height:24,fontSize:11}}>{score}</span>
                    {pb(p.pos)}
                    <div style={{minWidth:0}}>
                      <div className="brow-name" style={{fontSize:12.5}}>{p.n}</div>
                      <div className="brow-sub">
                        <span>{p.tm}</span>
                        <span style={{color:isManualGone?"#e05c5c":"#e08c5c"}}>{isManualGone?"marked gone":"ADP "+(p[adpKey]||p.udAdp)+" — likely drafted"}</span>
                      </div>
                    </div>
                    <div className="brow-right">
                      {isManualGone && <button className="gone-btn undo" onClick={()=>onUnmarkGone(p.n)} title="Undo">↩</button>}
                      <button className="draft-btn" onClick={()=>onAddPick(p)} title="He fell to me — draft him">+</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// STACKS TAB (pre-draft reference, simplified)
// ══════════════════════════════════════════════════════
function StacksTab({ onAddPick, picks=[], slot=6, teamSize=12, plat="UD", gone=[] }) {
  const adpKey = plat==="DK" ? "dkAdp" : "udAdp";
  const goneSet = useMemo(()=>new Set(gone),[gone]);
  const ownedSet = useMemo(()=>new Set(picks.map(p=>p.player.n)),[picks]);
  const currentRound = picks.length + 1;
  const currentOverall = myOverall(currentRound, slot, teamSize);

  // Best of MY remaining picks to target a player at: round whose pick# is closest to his ADP (not in the past)
  const targetRound = (adp) => {
    let best = null, bestDist = 1e9;
    for (let r = currentRound; r <= 18; r++) {
      const ov = myOverall(r, slot, teamSize);
      const d = Math.abs(ov - adp);
      if (d < bestDist) { bestDist = d; best = { r, ov, odds: pickBackOdds(adp, ov) }; }
    }
    return best;
  };

  // My stacks: group picks by team
  const myStacks = useMemo(() => {
    const byTeam = {};
    picks.forEach(pk => {
      const p = pk.player;
      if (p.tm==="FA") return;
      if (!byTeam[p.tm]) byTeam[p.tm] = [];
      byTeam[p.tm].push(p);
    });
    return Object.entries(byTeam)
      .map(([tm, mine]) => {
        const avail = PLAYERS
          .filter(p => p.tm===tm && !ownedSet.has(p.n) && !goneSet.has(p.n) && (p[adpKey]||p.udAdp) > currentOverall - 12)
          .sort((a,b)=>(a[adpKey]||a.udAdp)-(b[adpKey]||b.udAdp))
          .slice(0,3)
          .map(p => ({ p, tgt: targetRound(p[adpKey]||p.udAdp) }));
        // bring-backs: best available player from each W15-17 opponent
        const bbs = (SCHED[tm]?.w||[]).map(([opp,ha],i) => {
          const best = PLAYERS
            .filter(p => p.tm===opp && (p.pos==="WR"||p.pos==="RB"||p.pos==="TE") && !ownedSet.has(p.n) && !goneSet.has(p.n) && (p[adpKey]||p.udAdp) > currentOverall - 12)
            .sort((a,b)=>(a[adpKey]||a.udAdp)-(b[adpKey]||b.udAdp))[0];
          return best ? { p: best, opp, wk: 15+i, ha, tgt: targetRound(best[adpKey]||best.udAdp) } : null;
        }).filter(Boolean);
        return { tm, mine, avail, bbs, hasQB: mine.some(p=>p.pos==="QB") };
      })
      .sort((a,b) => b.mine.length - a.mine.length || (b.hasQB?1:0)-(a.hasQB?1:0));
  }, [picks, ownedSet, goneSet, adpKey, currentOverall, slot, teamSize]);
  // Non-rostered stacks: teams where I own NOBODY, with a still-attainable QB + pass-catcher core
  const nonRostered = useMemo(() => {
    const myTeams = new Set(picks.map(pk=>pk.player.tm));
    const byTeam = {};
    PLAYERS.forEach(p => {
      if (p.tm==="FA" || myTeams.has(p.tm)) return;
      if (ownedSet.has(p.n) || goneSet.has(p.n)) return;
      const adp = p[adpKey]||p.udAdp;
      if (adp <= currentOverall - 12) return; // effectively drafted
      if (!byTeam[p.tm]) byTeam[p.tm] = [];
      byTeam[p.tm].push(p);
    });
    return Object.entries(byTeam).map(([tm, avail]) => {
      const srt = avail.sort((a,b)=>(a[adpKey]||a.udAdp)-(b[adpKey]||b.udAdp));
      const qb = srt.find(p=>p.pos==="QB");
      const pcs = srt.filter(p=>p.pos==="WR"||p.pos==="TE").slice(0,2);
      const rb = srt.find(p=>p.pos==="RB");
      if (!qb || pcs.length===0) return null; // need a stackable core remaining
      const pieces = [qb, ...pcs, ...(rb?[rb]:[])].map(p=>({p, tgt: targetRound(p[adpKey]||p.udAdp)}));
      const entry = Math.min(...pieces.map(x=>x.p[adpKey]||x.p.udAdp));
      return { tm, pieces, entry, entryTgt: targetRound(entry), g: SCHED_GRADE[tm]||"avg" };
    }).filter(Boolean).sort((a,b)=>a.entry-b.entry);
  }, [picks, ownedSet, goneSet, adpKey, currentOverall, slot, teamSize]);
  return (
    <div>
      {/* ── YOUR DRAFT STACKS — live, based on current picks ── */}
      {myStacks.length > 0 && (
        <div style={{marginBottom:18}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:".8px",color:"#3ecf8e88",fontFamily:"DM Mono,monospace",marginBottom:8}}>
            ⚡ Your Draft — Stack Targets (R{currentRound}, pick #{currentOverall})
          </div>
          <div style={{display:"grid",gap:8,gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))"}}>
            {myStacks.map(({tm, mine, avail, bbs, hasQB}) => {
              const g = SCHED_GRADE[tm]||"avg";
              return (
                <div key={tm} className="stk-card" style={{borderColor:hasQB?"#3ecf8e33":"#151f2e"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontWeight:700,fontSize:14}}>{tm} {hasQB && <span style={{fontSize:9.5,color:"#3ecf8e",fontFamily:"DM Mono"}}>QB STACK</span>}</span>
                    <span className="mono" style={{fontSize:10,color:GRADE_C[g]}}>{g.toUpperCase()} W15-17</span>
                  </div>
                  {/* my pieces */}
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                    {mine.map(p=>(
                      <span key={p.n} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#3ecf8e10",border:"1px solid #3ecf8e33",borderRadius:5,padding:"2px 7px",fontSize:11}}>
                        {pb(p.pos,true)}<span style={{fontWeight:600,color:"#3ecf8e"}}>{p.n}</span><span style={{fontSize:9,color:"#3ecf8e"}}>✓</span>
                      </span>
                    ))}
                  </div>
                  {/* completions */}
                  {avail.length>0 && <>
                    <div style={{fontSize:9,color:"#2a3850",fontFamily:"DM Mono",textTransform:"uppercase",letterSpacing:".5px",marginBottom:4}}>Complete the stack</div>
                    {avail.map(({p,tgt})=>(
                      <div key={p.n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #0a111e",fontSize:12}}>
                        <span style={{display:"flex",alignItems:"center",gap:5}}>
                          {pb(p.pos,true)}<span style={{fontWeight:600}}>{p.n}</span>
                          <span className="mono" style={{fontSize:10,color:"#3a4d63"}}>{plat==="DK"&&p.dkEst?"~":""}{p[adpKey]||p.udAdp}</span>
                        </span>
                        <span style={{display:"flex",alignItems:"center",gap:6}}>
                          {tgt && <span className="mono" style={{fontSize:10,color:tgt.odds>=60?"#3ecf8e":tgt.odds>=35?"#f4a848":"#e05c5c"}}>tgt R{tgt.r} · {tgt.odds}%</span>}
                          <button onClick={()=>onAddPick(p)} style={{width:20,height:20,borderRadius:4,background:"#3ecf8e18",border:"1px solid #3ecf8e44",color:"#3ecf8e",fontSize:13,lineHeight:1,cursor:"pointer",fontWeight:700}}>+</button>
                        </span>
                      </div>
                    ))}
                  </>}
                  {/* bring-backs */}
                  {bbs.length>0 && <>
                    <div style={{fontSize:9,color:"#a78bfa66",fontFamily:"DM Mono",textTransform:"uppercase",letterSpacing:".5px",margin:"7px 0 4px"}}>Bring-backs (W15-17)</div>
                    {bbs.map(({p,opp,wk,ha,tgt})=>(
                      <div key={p.n+wk} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #0a111e",fontSize:12}}>
                        <span style={{display:"flex",alignItems:"center",gap:5}}>
                          <span className="corr-icon corr-bb">{tm}·{wk}</span>
                          {pb(p.pos,true)}<span style={{fontWeight:600}}>{p.n}</span>
                          <span className="mono" style={{fontSize:10,color:"#3a4d63"}}>{plat==="DK"&&p.dkEst?"~":""}{p[adpKey]||p.udAdp}</span>
                        </span>
                        <span style={{display:"flex",alignItems:"center",gap:6}}>
                          {tgt && <span className="mono" style={{fontSize:10,color:tgt.odds>=60?"#3ecf8e":tgt.odds>=35?"#f4a848":"#e05c5c"}}>tgt R{tgt.r} · {tgt.odds}%</span>}
                          <button onClick={()=>onAddPick(p)} style={{width:20,height:20,borderRadius:4,background:"#a78bfa18",border:"1px solid #a78bfa44",color:"#a78bfa",fontSize:13,lineHeight:1,cursor:"pointer",fontWeight:700}}>+</button>
                        </span>
                      </div>
                    ))}
                  </>}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {myStacks.length === 0 && (
        <div className="ticker tk-ok" style={{marginBottom:14}}>Draft players in the ⚡ Draft tab — your stacks and completion targets will appear here live.</div>
      )}

      <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:".8px",color:"#2a3850",fontFamily:"DM Mono,monospace",marginBottom:8}}>
        Non-Rostered Stacks — pivots still on the board ({nonRostered.length} teams)
      </div>
      <div style={{display:"grid",gap:8,gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))"}}>
        {nonRostered.map(({tm, pieces, entry, entryTgt, g}) => (
          <div key={tm} className="stk-card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontWeight:700,fontSize:14}}>{tm}</span>
              <span style={{display:"flex",gap:6,alignItems:"center"}}>
                {entryTgt && <span className="mono" style={{fontSize:10,color:"#5a6a80",background:"#10192a",border:"1px solid #1c2840",padding:"2px 7px",borderRadius:4}}>starts R{entryTgt.r}</span>}
                <span className="mono" style={{fontSize:10,color:GRADE_C[g]}}>{g.toUpperCase()}</span>
              </span>
            </div>
            {pieces.map(({p,tgt})=>(
              <div key={p.n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #0a111e",fontSize:12}}>
                <span style={{display:"flex",alignItems:"center",gap:5}}>
                  {pb(p.pos,true)}<span style={{fontWeight:600}}>{p.n}</span>
                  <span className="mono" style={{fontSize:10,color:"#3a4d63"}}>{plat==="DK"&&p.dkEst?"~":""}{p[adpKey]||p.udAdp}</span>
                </span>
                <span style={{display:"flex",alignItems:"center",gap:6}}>
                  {tgt && <span className="mono" style={{fontSize:10,color:tgt.odds>=60?"#3ecf8e":tgt.odds>=35?"#f4a848":"#e05c5c"}}>tgt R{tgt.r} · {tgt.odds}%</span>}
                  <button onClick={()=>onAddPick(p)} style={{width:20,height:20,borderRadius:4,background:"#3ecf8e18",border:"1px solid #3ecf8e44",color:"#3ecf8e",fontSize:13,lineHeight:1,cursor:"pointer",fontWeight:700}}>+</button>
                </span>
              </div>
            ))}
          </div>
        ))}
        {nonRostered.length===0 && <div className="empty">No complete non-rostered stacks remain — all remaining QB cores are gone or rostered</div>}
      </div>

      {/* ── W17 FINALS GAMES — environment-ranked, with my coverage ── */}
      <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:".8px",color:"#f4a84888",fontFamily:"DM Mono,monospace",margin:"18px 0 8px"}}>
        🏆 Week 17 Finals Games — ranked by environment
      </div>
      <div style={{display:"grid",gap:6,gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))"}}>
        {W17_GAMES.map(g => {
          const mineAway = picks.filter(pk=>pk.player.tm===g.away).map(pk=>pk.player);
          const mineHome = picks.filter(pk=>pk.player.tm===g.home).map(pk=>pk.player);
          const bothSides = mineAway.length>0 && mineHome.length>0;
          const topAvail = (tm) => PLAYERS
            .filter(p=>p.tm===tm && !ownedSet.has(p.n) && !goneSet.has(p.n) && (p[adpKey]||p.udAdp) > currentOverall - 12)
            .sort((a,b)=>(a[adpKey]||a.udAdp)-(b[adpKey]||b.udAdp))[0];
          const aA = topAvail(g.away), aH = topAvail(g.home);
          return (
            <div key={g.home} className="stk-card" style={{borderColor:bothSides?"#f4a84855":g.grade==="A"?"#3ecf8e22":"#151f2e",padding:"10px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                <span style={{fontWeight:700,fontSize:13}} className="mono">{g.away} @ {g.home}</span>
                <span style={{display:"flex",gap:5,alignItems:"center"}}>
                  {bothSides && <span className="mono" style={{fontSize:9,color:"#f4a848",background:"#f4a84812",border:"1px solid #f4a84833",padding:"1px 6px",borderRadius:4}}>GAME STACKED</span>}
                  <span className="mono" style={{fontSize:11,fontWeight:700,color:W17_GRADE_C[g.grade]}}>{g.grade}</span>
                </span>
              </div>
              {/* my coverage per side */}
              <div style={{display:"flex",gap:8,fontSize:10.5,marginBottom:5}} className="mono">
                <span style={{color:mineAway.length?"#3ecf8e":"#2a3850"}}>{g.away}: {mineAway.length?mineAway.map(p=>p.n.split(" ").slice(-1)[0]).join(", "):"—"}</span>
                <span style={{color:mineHome.length?"#3ecf8e":"#2a3850"}}>{g.home}: {mineHome.length?mineHome.map(p=>p.n.split(" ").slice(-1)[0]).join(", "):"—"}</span>
              </div>
              {/* quick targets for uncovered sides */}
              {(!bothSides) && (
                <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                  {[!mineAway.length&&aA?{p:aA,side:g.away}:null, !mineHome.length&&aH?{p:aH,side:g.home}:null].filter(Boolean).map(({p,side})=>(
                    <span key={p.n} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#080b10",border:"1px solid #151f2e",borderRadius:5,padding:"2px 6px",fontSize:10.5}}>
                      {pb(p.pos,true)}<span style={{fontWeight:600}}>{p.n}</span>
                      <span className="mono" style={{fontSize:9.5,color:"#3a4d63"}}>{p[adpKey]||p.udAdp}</span>
                      <button onClick={()=>onAddPick(p)} style={{width:17,height:17,borderRadius:4,background:"#f4a84818",border:"1px solid #f4a84844",color:"#f4a848",fontSize:11,lineHeight:1,cursor:"pointer",fontWeight:700}}>+</button>
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// PORTFOLIO TAB
// ══════════════════════════════════════════════════════
function PortfolioTab({ teams, onAdd, onRemoveTeam, onRemovePlayer }) {
  const [activeId, setActiveId] = useState(teams[0]?.id||null);
  useEffect(()=>{ if(!teams.find(t=>t.id===activeId)&&teams.length>0) setActiveId(teams[0].id); },[teams]);
  const team = teams.find(t=>t.id===activeId)||teams[0];
  const allPs = teams.flatMap(t=>t.players);
  const total = teams.length;
  const expMap = useMemo(()=>{const m={};allPs.forEach(p=>{m[p.n]=(m[p.n]||0)+1;});return m;},[allPs]);
  const topExp = Object.entries(expMap).sort((a,b)=>b[1]-a[1]).slice(0,16);
  const highExp = topExp.filter(([n,cnt])=>total>1&&Math.round((cnt/total)*100)>=50);

  return (
    <div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {teams.map(t=><button key={t.id} className={`chip ${activeId===t.id?"chip-on":"chip-off"}`} onClick={()=>setActiveId(t.id)} style={{fontSize:11}}>{t.name} ({t.players.length})</button>)}
        <button className="chip chip-off" style={{fontSize:11}} onClick={onAdd}>+ New</button>
      </div>
      <div className="port-grid">
        <div className="panel">
          <div className="panel-t">{team?.name||"Draft"}</div>
          {team && (team.players.length===0 ? <div className="empty">Save a draft from the Draft tab</div> :
            team.players.map(p=>{
              const cnt=expMap[p.n]||0;
              const pct=total>0?Math.round((cnt/total)*100):0;
              const g = SCHED_GRADE[p.tm];
              return(
                <div key={p.n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #0a111e",fontSize:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    {pb(p.pos)}
                    <span style={{fontWeight:600}}>{p.n}</span>
                    <span className="mono" style={{fontSize:10,color:"#3a4d63"}}>{p.tm}</span>
                    {g && <span className="sched-dot" style={{background:GRADE_C[g]}}/>}
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {pct>=33&&<span className="mono" style={{fontSize:10,color:"#f4a848"}}>{pct}%</span>}
                    <button className="rmv-btn" onClick={()=>onRemovePlayer(team.id,p.n)}>×</button>
                  </div>
                </div>
              );
            })
          )}
          {team && team.players.length>0 && <button style={{marginTop:8,fontSize:11,color:"#e05c5c",background:"none",border:"1px solid #e05c5c22",borderRadius:6,padding:"4px 10px",width:"100%",cursor:"pointer"}} onClick={()=>onRemoveTeam(team.id)}>Remove draft</button>}
        </div>
        <div className="panel">
          <div className="panel-t">Exposure ({total} draft{total!==1?"s":""})</div>
          {highExp.length>0 && <div className="ticker tk-warn" style={{marginBottom:8}}>⚠️ 50%+ exposure: {highExp.map(([n])=>n).join(", ")}</div>}
          {topExp.length===0 ? <div className="empty">No drafts saved yet</div> :
            topExp.map(([name,cnt])=>{
              const p=PLAYERS.find(pl=>pl.n===name);
              const pct=Math.round((cnt/total)*100);
              return(
                <div key={name} className="exp-row">
                  {p&&pb(p.pos,true)}
                  <span className="exp-lbl">{name}</span>
                  <div className="exp-bg"><div className="exp-fill" style={{width:pct+"%",background:pct>=60?"#e05c5c":pct>=33?"#f4a848":"#3ecf8e"}}/></div>
                  <span className="exp-pct">{pct}%</span>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>
  );
}

// ROOT

function App() {
  const [tab, setTab] = useState("draft");
  const [portfolio, setPortfolio] = useState([]);
  const [draftPicks, setDraftPicks] = useState([]);
  const [gone, setGone] = useState([]); // players drafted by OTHER teams (names)
  const [draftSlot, setDraftSlot] = useState(6);
  const [draftTeamSize, setDraftTeamSize] = useState(12);
  const [draftPlat, setDraftPlat] = useState("UD");
  const [draftName, setDraftName] = useState("");

  const hydrated = useRef(false);
  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("bblab7-port");if(r){const d=JSON.parse(r.value);if(d?.length)setPortfolio(d);}}catch(e){}
      // Resume in-progress draft (survives reload/close)
      try{
        const r2=await window.storage.get("bblab7-live");
        if(r2){const d=JSON.parse(r2.value);
          if(d?.picks?.length){setDraftPicks(d.picks);setGone(d.gone||[]);setDraftSlot(d.slot||6);setDraftTeamSize(d.teamSize||12);setDraftPlat(d.plat||"UD");setDraftName(d.name||"");}
        }
      }catch(e){}
      hydrated.current = true;
    })();
  },[]);

  // Auto-save live draft after every pick / change
  useEffect(()=>{
    if(!hydrated.current) return;
    try{window.storage.set("bblab7-live",JSON.stringify({picks:draftPicks,gone,slot:draftSlot,teamSize:draftTeamSize,plat:draftPlat,name:draftName}));}catch(e){}
  },[draftPicks,gone,draftSlot,draftTeamSize,draftPlat,draftName]);
  const savePort = p => { setPortfolio(p); try{window.storage.set("bblab7-port",JSON.stringify(p));}catch(e){} };

  const portExp = useMemo(()=>{
    const m={}; portfolio.flatMap(t=>t.players).forEach(p=>{m[p.n]=(m[p.n]||0)+1;});
    return m;
  },[portfolio]);

  const addPick = useCallback(p => {
    setDraftPicks(prev => {
      if (prev.find(pk=>pk.player.n===p.n)) return prev;
      return [...prev, {player:p, round: prev.length+1}];
    });
    setGone(prev => prev.filter(x=>x!==p.n));
    setTab("draft");
  },[]);

  const removePick = i => setDraftPicks(prev=>prev.filter((_,idx)=>idx!==i));
  const clearPicks = () => { if(window.confirm("Clear all picks?")) { setDraftPicks([]); setGone([]); try{window.storage.delete("bblab7-live");}catch(e){} } };
  const markGone = useCallback(n => setGone(prev => prev.includes(n) ? prev : [...prev, n]), []);
  const unmarkGone = useCallback(n => setGone(prev => prev.filter(x=>x!==n)), []);
  const saveDraft = ({name,players,slot}) => {
    const id=Date.now();
    savePort([...portfolio,{id,name:`${name} (S${slot})`,players}]);
  };
  const addTeam = () => { const id=Date.now(); savePort([...portfolio,{id,name:`Draft ${portfolio.length+1}`,players:[]}]); };
  const removeTeam = id => savePort(portfolio.filter(t=>t.id!==id));
  const removePlayer = (teamId,name) => savePort(portfolio.map(t=>t.id===teamId?{...t,players:t.players.filter(p=>p.n!==name)}:t));

  const TABS=[{id:"draft",l:"⚡ Draft"},{id:"stacks",l:"Stacks"},{id:"portfolio",l:"Portfolio"}];

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        <div className="topbar">
          <div>
            <div className="logo">best<em>ball</em>.lab</div>
          </div>
          <div className="tabs">
            {TABS.map(t=><button key={t.id} className={`tab ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>{t.l}</button>)}
          </div>
        </div>
        <div style={{display:tab==="draft"?"block":"none"}}>
          <DraftTab
            picks={draftPicks} slot={draftSlot} teamSize={draftTeamSize} plat={draftPlat} draftName={draftName}
            onSetSlot={setDraftSlot} onSetTeamSize={setDraftTeamSize} onSetPlat={setDraftPlat} onSetDraftName={setDraftName}
            onAddPick={addPick} onRemovePick={removePick} onClearPicks={clearPicks} onSaveDraft={saveDraft}
            gone={gone} onMarkGone={markGone} onUnmarkGone={unmarkGone}
            portExp={portExp} totalPort={portfolio.length}
          />
        </div>
        {tab==="stacks" && <StacksTab onAddPick={addPick} picks={draftPicks} slot={draftSlot} teamSize={draftTeamSize} plat={draftPlat} gone={gone}/>}
        {tab==="portfolio" && <PortfolioTab teams={portfolio} onAdd={addTeam} onRemoveTeam={removeTeam} onRemovePlayer={removePlayer}/>}
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
